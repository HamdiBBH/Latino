name: Keep Supabase Alive

on:
  schedule:
    # S'exécute tous les jours à 10:00 UTC
    - cron: '0 10 * * *'
  # Permet également de lancer l'action manuellement depuis l'interface GitHub
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API pour éviter la mise en veille
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          echo "Pinging Supabase at $SUPABASE_URL"
          curl -sSf \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/"
